let currentMapIdx = 0;

// ----- A* Pathfinding Module -----
const GRID_CELL = 20;
let GRID_COLS, GRID_ROWS;
const navGrids = {};

function initPathfinding() {
    GRID_COLS = Math.ceil(canvas.width  / GRID_CELL);
    GRID_ROWS = Math.ceil(canvas.height / GRID_CELL);
    for (let i = 0; i < MAPS.length; i++) {
        navGrids[i] = buildNavGrid(i);
    }
}

function buildNavGrid(mapIdx) {
    const map = MAPS[mapIdx];
    const grid = new Uint8Array(GRID_COLS * GRID_ROWS);
    const inflate = 14;
    for (let row = 0; row < GRID_ROWS; row++) {
        for (let col = 0; col < GRID_COLS; col++) {
            const cx = col * GRID_CELL + GRID_CELL * 0.5;
            const cy = row * GRID_CELL + GRID_CELL * 0.5;
            let blocked = cx < inflate || cy < inflate ||
                          cx > canvas.width  - inflate ||
                          cy > canvas.height - inflate;
            if (!blocked) {
                for (const w of map.walls) {
                    if (cx >= w.x - inflate && cx <= w.x + w.w + inflate &&
                        cy >= w.y - inflate && cy <= w.y + w.h + inflate) {
                        blocked = true;
                        break;
                    }
                }
            }
            grid[row * GRID_COLS + col] = blocked ? 1 : 0;
        }
    }
    return grid;
}

class MinHeap {
    constructor() { this.d = []; }
    push(item) {
        this.d.push(item);
        let i = this.d.length - 1;
        while (i > 0) {
            const p = (i - 1) >> 1;
            if (this.d[p].f <= this.d[i].f) break;
            [this.d[p], this.d[i]] = [this.d[i], this.d[p]];
            i = p;
        }
    }
    pop() {
        const top = this.d[0];
        const last = this.d.pop();
        if (this.d.length) {
            this.d[0] = last;
            let i = 0;
            while (true) {
                let s = i, l = 2*i+1, r = 2*i+2;
                if (l < this.d.length && this.d[l].f < this.d[s].f) s = l;
                if (r < this.d.length && this.d[r].f < this.d[s].f) s = r;
                if (s === i) break;
                [this.d[s], this.d[i]] = [this.d[i], this.d[s]];
                i = s;
            }
        }
        return top;
    }
    get size() { return this.d.length; }
}

const DIRS_8 = [
    { dc: 1,  dr: 0,  cost: 1     }, { dc: -1, dr: 0,  cost: 1     },
    { dc: 0,  dr: 1,  cost: 1     }, { dc: 0,  dr: -1, cost: 1     },
    { dc: 1,  dr: 1,  cost: 1.414 }, { dc: -1, dr: 1,  cost: 1.414 },
    { dc: 1,  dr: -1, cost: 1.414 }, { dc: -1, dr: -1, cost: 1.414 }
];

function findPath(startX, startY, goalX, goalY, mapIdx) {
    const grid = navGrids[mapIdx];
    if (!grid) return null;

    let sc = Math.max(0, Math.min(GRID_COLS-1, Math.floor(startX / GRID_CELL)));
    let sr = Math.max(0, Math.min(GRID_ROWS-1, Math.floor(startY / GRID_CELL)));
    let gc = Math.max(0, Math.min(GRID_COLS-1, Math.floor(goalX  / GRID_CELL)));
    let gr = Math.max(0, Math.min(GRID_ROWS-1, Math.floor(goalY  / GRID_CELL)));

    // Snap blocked start/goal cells to nearest open cell
    for (const [colRef, rowRef] of [[sc, sr], [gc, gr]]) {
        if (grid[rowRef * GRID_COLS + colRef] === 1) {
            let best = Infinity, bc = colRef, br = rowRef;
            for (let r2 = 0; r2 < GRID_ROWS; r2++)
                for (let c2 = 0; c2 < GRID_COLS; c2++)
                    if (grid[r2 * GRID_COLS + c2] === 0) {
                        const d = Math.hypot(c2 - colRef, r2 - rowRef);
                        if (d < best) { best = d; bc = c2; br = r2; }
                    }
            if (colRef === sc) { sc = bc; sr = br; }
            else               { gc = bc; gr = br; }
        }
    }

    const startKey = sr * GRID_COLS + sc;
    const goalKey  = gr * GRID_COLS + gc;
    if (startKey === goalKey) return [];

    const open     = new MinHeap();
    const gScore   = new Float32Array(GRID_COLS * GRID_ROWS).fill(Infinity);
    const cameFrom = new Int32Array(GRID_COLS * GRID_ROWS).fill(-1);
    const closed   = new Uint8Array(GRID_COLS * GRID_ROWS);

    gScore[startKey] = 0;
    open.push({ f: 0, key: startKey, col: sc, row: sr });

    while (open.size > 0) {
        const cur = open.pop();
        if (closed[cur.key]) continue;
        closed[cur.key] = 1;

        if (cur.key === goalKey) {
            const raw = [];
            let k = goalKey;
            while (k !== startKey && k >= 0) {
                raw.unshift({
                    x: (k % GRID_COLS) * GRID_CELL + GRID_CELL * 0.5,
                    y: Math.floor(k / GRID_COLS) * GRID_CELL + GRID_CELL * 0.5
                });
                k = cameFrom[k];
            }
            return smoothPath(raw, startX, startY, mapIdx);
        }

        for (const dir of DIRS_8) {
            const nc = cur.col + dir.dc;
            const nr = cur.row + dir.dr;
            if (nc < 0 || nc >= GRID_COLS || nr < 0 || nr >= GRID_ROWS) continue;
            const nk = nr * GRID_COLS + nc;
            if (closed[nk] || grid[nk] === 1) continue;
            if (dir.dc !== 0 && dir.dr !== 0) {
                if (grid[cur.row * GRID_COLS + nc] === 1 ||
                    grid[nr   * GRID_COLS + cur.col] === 1) continue;
            }
            const tentG = gScore[cur.key] + dir.cost;
            if (tentG < gScore[nk]) {
                gScore[nk]   = tentG;
                cameFrom[nk] = cur.key;
                open.push({ f: tentG + Math.hypot(nc - gc, nr - gr), key: nk, col: nc, row: nr });
            }
        }
    }
    return null;
}

function hasLoSWorld(x1, y1, x2, y2, mapIdx) {
    const map = MAPS[mapIdx];
    const steps = Math.max(2, Math.ceil(Math.hypot(x2-x1, y2-y1) / 10));
    for (let i = 1; i < steps; i++) {
        const t = i / steps;
        const px = x1 + (x2-x1) * t;
        const py = y1 + (y2-y1) * t;
        for (const w of map.walls)
            if (px > w.x && px < w.x+w.w && py > w.y && py < w.y+w.h) return false;
    }
    return true;
}

function smoothPath(raw, startX, startY, mapIdx) {
    if (!raw || raw.length === 0) return raw;
    const out = [];
    let fx = startX, fy = startY;
    let i = 0;
    while (i < raw.length) {
        let furthest = i;
        for (let j = raw.length - 1; j > i; j--) {
            if (hasLoSWorld(fx, fy, raw[j].x, raw[j].y, mapIdx)) {
                furthest = j;
                break;
            }
        }
        out.push(raw[furthest]);
        fx = raw[furthest].x;
        fy = raw[furthest].y;
        i  = furthest + 1;
    }
    return out;
}
// ----- End Pathfinding Module -----

// ----- Crack generation -----
function generateCrackSet(stage) {
    const rng = () => Math.random();
    const impactCount = stage;
    const impacts = [
        {x: 80  + rng() * 220, y: 60  + rng() * 140},
        {x: 480 + rng() * 240, y: 50  + rng() * 130},
        {x: 160 + rng() * 480, y: 280 + rng() * 180}
    ].slice(0, impactCount);

    const lines = [];
    for (const imp of impacts) {
        const numRays = 5 + stage * 4;
        for (let i = 0; i < numRays; i++) {
            const baseAngle = (i / numRays) * Math.PI * 2 + (rng() - 0.5) * 0.5;
            const totalLen = 25 + rng() * (30 + stage * 25);
            const segs = [];
            let cx = imp.x, cy = imp.y, a = baseAngle;
            const segCount = 3 + Math.floor(rng() * 2);
            for (let s = 0; s < segCount; s++) {
                a += (rng() - 0.5) * 0.55;
                const sLen = totalLen / segCount;
                const nx = cx + Math.cos(a) * sLen;
                const ny = cy + Math.sin(a) * sLen;
                segs.push({x1: cx, y1: cy, x2: nx, y2: ny});
                if (s === 1 && rng() < 0.45) {
                    const ba = a + (rng() - 0.5) * 1.3;
                    const bl = sLen * 0.55;
                    lines.push([{x1: cx, y1: cy, x2: cx + Math.cos(ba)*bl, y2: cy + Math.sin(ba)*bl}]);
                }
                cx = nx; cy = ny;
            }
            lines.push(segs);
        }
    }
    return lines;
}

// ----- Audio -----
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function playShot(isPlayer) {
    try {
        const ac = getAudio();
        const dur = isPlayer ? 0.065 : 0.16;
        const bufLen = Math.floor(ac.sampleRate * dur);
        const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) {
            const t = i / ac.sampleRate;
            const env = isPlayer ? Math.exp(-t * 48) : Math.exp(-t * 16);
            data[i] = (Math.random() * 2 - 1) * env;
        }
        const src = ac.createBufferSource();
        src.buffer = buf;

        const lpf = ac.createBiquadFilter();
        lpf.type = 'lowpass';
        lpf.frequency.value = isPlayer ? 3800 : 1600;

        const hpf = ac.createBiquadFilter();
        hpf.type = 'highpass';
        hpf.frequency.value = isPlayer ? 1100 : 180;

        const gain = ac.createGain();
        gain.gain.value = isPlayer ? 0.13 : 0.08;

        src.connect(lpf); lpf.connect(hpf); hpf.connect(gain); gain.connect(ac.destination);

        if (!isPlayer) {
            const osc = ac.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 75;
            const og = ac.createGain();
            og.gain.setValueAtTime(0.28, ac.currentTime);
            og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
            osc.connect(og); og.connect(ac.destination);
            osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.16);
        }

        src.start(ac.currentTime);
    } catch(e) {}
}

function isPositionInvalid(pos) {
    if (pos.x < 0 || pos.x > canvas.width || pos.y < 0 || pos.y > canvas.height) return true;
    for (let w of walls) {
        if (pos.x > w.x && pos.x < w.x + w.w && pos.y > w.y && pos.y < w.y + w.h) return true;
    }
    return false;
}

function checkWallCollision(obj, newX, newY) {
    if (newX < obj.r || newX > canvas.width - obj.r || newY < obj.r || newY > canvas.height - obj.r) return true;
    for (let w of walls) {
        if (newX + obj.r > w.x && newX - obj.r < w.x + w.w &&
            newY + obj.r > w.y && newY - obj.r < w.y + w.h) return true;
    }
    return false;
}

function getWallDistance(obj) {
    let minDist = Infinity;
    let closestPt = {x: obj.x, y: obj.y};
    for (let w of walls) {
        const cx = Math.max(w.x, Math.min(obj.x, w.x + w.w));
        const cy = Math.max(w.y, Math.min(obj.y, w.y + w.h));
        const dist = Math.hypot(obj.x - cx, obj.y - cy);
        if (dist < minDist) {
            minDist = dist;
            closestPt = {x: cx, y: cy};
        }
    }
    const bounds = [
        {cx: obj.x, cy: 0}, {cx: obj.x, cy: canvas.height},
        {cx: 0, cy: obj.y}, {cx: canvas.width, cy: obj.y}
    ];
    for (let b of bounds) {
        const dist = Math.hypot(obj.x - b.cx, obj.y - b.cy);
        if (dist < minDist) {
            minDist = dist;
            closestPt = {x: b.cx, y: b.cy};
        }
    }
    return {dist: minDist, closestPt};
}

function hasLoS(a, b) {
    for (let w of walls) {
        if (lineRect(a.x, a.y, b.x, b.y, w.x, w.y, w.w, w.h)) return false;
    }
    return true;
}

function lineRect(x1, y1, x2, y2, rx, ry, rw, rh) {
    const l = lineLine(x1, y1, x2, y2, rx, ry, rx, ry + rh);
    const r = lineLine(x1, y1, x2, y2, rx + rw, ry, rx + rw, ry + rh);
    const t = lineLine(x1, y1, x2, y2, rx, ry, rx + rw, ry);
    const b = lineLine(x1, y1, x2, y2, rx, ry + rh, rx + rw, ry + rh);
    return l || r || t || b;
}

function lineLine(x1, y1, x2, y2, x3, y3, x4, y4) {
    const denom = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
    if (Math.abs(denom) < 0.0001) return false;
    const uA = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / denom;
    const uB = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / denom;
    return (uA >= 0 && uA <= 1 && uB >= 0 && uB <= 1);
}

// ----- Stalker class (independent AI) -----
class Stalker {
    constructor(x, y, id) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.r = 12;
        this.hp = 100;
        this.speed = ENEMY_SPEED;
        this.shootCooldown = 0;
        this.broadcastTimer = 0;
        this.deathAlertTimer = 0;

        // Knowledge
        this.knownPos = null;
        this.knownVel = {x: 0, y: 0};
        this.lastSightTime = -Infinity;
        this.confidence = 0;
        this.hasSight = false;

        // Communication
        this.lastBroadcastTime = -Infinity;
        this.lastLostBroadcastTime = -Infinity;
        this.msgDelays = new Map();
        this.processedMsgIds = new Set();
        this.processedDeathAlerts = new Set();

        // Zones
        this.dangerZones = [];
        this.clearZones = [];

        // Sweep state (continuous until contact)
        this.state = 'sweep';
        this.sweepTarget = this.getInitialSweepTarget();
        this.sweepPeekTimer = 1.5;
        this.sweepMoving = true;
        this.patrolTarget = this.randomPatrolPoint();

        // Pathfinding state
        this.path            = [];
        this.pathTargetIdx   = 0;
        this.lastPathGoal    = null;
        this.pathRecalcTimer = 0;
    }

    getInitialSweepTarget() {
        const map = MAPS[currentMapIdx];
        return map.sweepTargets[this.id] || map.sweepTargets[0];
    }

    randomSweepTarget() {
        const pts = MAPS[currentMapIdx].patrolPoints;
        for (let i = 0; i < 10; i++) {
            const p = pts[Math.floor(Math.random() * pts.length)];
            if (!checkWallCollision({r: this.r}, p.x, p.y)) return p;
        }
        return MAPS[currentMapIdx].sweepTargets[this.id] || MAPS[currentMapIdx].sweepTargets[0];
    }

    randomPatrolPoint() {
        const pts = MAPS[currentMapIdx].patrolPoints;
        for (let i = 0; i < 10; i++) {
            const p = pts[Math.floor(Math.random() * pts.length)];
            if (!checkWallCollision({r: this.r}, p.x, p.y)) return p;
        }
        return {x: canvas.width/2, y: canvas.height/2};
    }

    processComms(now) {
        for (let i = 0; i < commsMessages.length; i++) {
            const msg = commsMessages[i];
            if (msg.senderId === this.id) continue;
            if (this.processedMsgIds.has(msg.id)) continue;

            if (!this.msgDelays.has(msg.id)) {
                const delay = 500 + Math.random() * 1000;
                this.msgDelays.set(msg.id, msg.time + delay);
            }
            const readyTime = this.msgDelays.get(msg.id);
            if (now >= readyTime) {
                if (msg.type === 'lost') {
                    this.clearZones.push({ x: msg.pos.x, y: msg.pos.y, time: now });
                } else {
                    const pos = {x: msg.pos.x, y: msg.pos.y};
                    if (!isPositionInvalid(pos)) {
                        this.knownPos = pos;
                        this.knownVel = {x: msg.vel.x, y: msg.vel.y};
                        this.lastSightTime = now;
                        this.confidence = 0.9;
                    }
                }
                this.msgDelays.delete(msg.id);
                this.processedMsgIds.add(msg.id);
            }
        }
    }

    processDeathAlerts(now) {
        for (let alert of deathAlerts) {
            if (!this.processedDeathAlerts.has(alert.id)) {
                this.processedDeathAlerts.add(alert.id);
                const playerPos = {x: alert.playerPos.x, y: alert.playerPos.y};
                if (!isPositionInvalid(playerPos)) {
                    this.knownPos = playerPos;
                    this.knownVel = {x: alert.playerVx, y: alert.playerVy};
                    this.lastSightTime = now;
                    this.confidence = 0.85;
                    this.deathAlertTimer = 1.5;
                }
            }
        }
    }

    broadcast(now) {
        if (this.confidence >= 0.95 && this.knownPos && !isPositionInvalid(this.knownPos) &&
            now - this.lastBroadcastTime > 1500) {
            commsMessages.push({
                id: commsIdCounter++,
                pos: {x: this.knownPos.x, y: this.knownPos.y},
                vel: {x: this.knownVel.x, y: this.knownVel.y},
                time: now,
                senderId: this.id,
                type: 'seen'
            });
            this.lastBroadcastTime = now;
            this.broadcastTimer = 1.0;
        }

        if (this.confidence < 0.3 && this.knownPos && now - this.lastLostBroadcastTime > 3000) {
            commsMessages.push({
                id: commsIdCounter++,
                pos: {x: this.knownPos.x, y: this.knownPos.y},
                time: now,
                senderId: this.id,
                type: 'lost'
            });
            this.lastLostBroadcastTime = now;
        }
    }

    avoidDangerZones(targetX, targetY, now) {
        let ax = targetX, ay = targetY;
        for (let zone of this.dangerZones) {
            const age = (now - zone.time) / 1000;
            if (age * 1000 > DANGER_ZONE_LIFETIME) continue;
            const dist = Math.hypot(ax - zone.x, ay - zone.y);
            if (dist < DANGER_ZONE_RADIUS) {
                const strength = (1 - dist / DANGER_ZONE_RADIUS) * (1 - age / (DANGER_ZONE_LIFETIME / 1000));
                const angle = Math.atan2(ay - zone.y, ax - zone.x);
                ax += Math.cos(angle) * strength * DANGER_PUSH_MAX;
                ay += Math.sin(angle) * strength * DANGER_PUSH_MAX;
            }
        }
        return {x: ax, y: ay};
    }

    adjustForClearZones(targetX, targetY, now) {
        let ax = targetX, ay = targetY;
        for (let zone of this.clearZones) {
            if (now - zone.time > CLEAR_ZONE_LIFETIME) continue;
            const dist = Math.hypot(ax - zone.x, ay - zone.y);
            if (dist < CLEAR_ZONE_RADIUS) {
                const angle = Math.atan2(ay - zone.y, ax - zone.x);
                const push = (CLEAR_ZONE_RADIUS - dist) * 0.8;
                ax += Math.cos(angle) * push;
                ay += Math.sin(angle) * push;
            }
        }
        return {x: ax, y: ay};
    }

    update(dt, now) {
        this.dangerZones = this.dangerZones.filter(z => now - z.time < DANGER_ZONE_LIFETIME);
        this.clearZones = this.clearZones.filter(z => now - z.time < CLEAR_ZONE_LIFETIME);

        const realPlayerPos = {x: player.x, y: player.y};
        const realPlayerVel = {x: player.vx, y: player.vy};
        const canSee = hasLoS(this, player) && Math.hypot(player.x - this.x, player.y - this.y) < 450;
        this.hasSight = canSee;
        if (canSee) {
            this.knownPos = {x: realPlayerPos.x, y: realPlayerPos.y};
            this.knownVel = {x: realPlayerVel.x, y: realPlayerVel.y};
            this.lastSightTime = now;
            this.confidence = 1.0;
        } else {
            if (this.lastSightTime !== -Infinity) {
                const elapsed = now - this.lastSightTime;
                this.confidence = Math.max(0, 1 - elapsed / 6000);
            }
        }

        if (this.knownPos && isPositionInvalid(this.knownPos)) {
            this.knownPos = null;
            this.knownVel = {x: 0, y: 0};
            this.confidence = 0;
        }

        this.processComms(now);
        this.processDeathAlerts(now);
        this.broadcast(now);
        if (this.broadcastTimer > 0) this.broadcastTimer -= dt;
        if (this.deathAlertTimer > 0) this.deathAlertTimer -= dt;

        const hasIntel = this.confidence > 0.3 && this.knownPos;
        if (hasIntel) {
            const distToKnown = Math.hypot(this.x - this.knownPos.x, this.y - this.knownPos.y);
            if (distToKnown < 500 && this.confidence > 0.6) {
                this.state = 'engage';
            } else {
                this.state = 'search';
            }
        } else if (this.state === 'sweep') {
        } else if (this.state === 'engage' || this.state === 'search') {
            this.state = 'patrol';
        }

        let moveTargetX = this.x, moveTargetY = this.y;
        switch (this.state) {
            case 'sweep':
                if (this.sweepMoving) {
                    moveTargetX = this.sweepTarget.x;
                    moveTargetY = this.sweepTarget.y;
                    const dist = Math.hypot(this.x - moveTargetX, this.y - moveTargetY);
                    if (dist < 30) {
                        this.sweepTarget = this.randomSweepTarget();
                    } else {
                        const baseAngle = Math.atan2(moveTargetY - this.y, moveTargetX - this.x);
                        const wobble = Math.sin(now * 0.01 + this.id) * 15;
                        moveTargetX += Math.cos(baseAngle + Math.PI/2) * wobble;
                        moveTargetY += Math.sin(baseAngle + Math.PI/2) * wobble;
                    }
                    this.sweepPeekTimer -= dt;
                    if (this.sweepPeekTimer <= 0) {
                        this.sweepMoving = !this.sweepMoving;
                        this.sweepPeekTimer = this.sweepMoving ? 1.5 : 0.5;
                    }
                    if (!this.sweepMoving) {
                        moveTargetX = this.x;
                        moveTargetY = this.y;
                    }
                } else {
                    this.sweepPeekTimer -= dt;
                    if (this.sweepPeekTimer <= 0) {
                        this.sweepMoving = true;
                        this.sweepPeekTimer = 1.5;
                    }
                    moveTargetX = this.x;
                    moveTargetY = this.y;
                }
                break;

            case 'patrol':
                moveTargetX = this.patrolTarget.x;
                moveTargetY = this.patrolTarget.y;
                if (Math.hypot(this.x - moveTargetX, this.y - moveTargetY) < 20) {
                    this.patrolTarget = this.randomPatrolPoint();
                }
                break;

            case 'search':
                if (this.knownPos) {
                    moveTargetX = this.knownPos.x;
                    moveTargetY = this.knownPos.y;
                }
                break;

            case 'engage':
                if (this.knownPos) {
                    const predictTime = 0.3 + Math.random() * 0.3;
                    const predictedX = this.knownPos.x + this.knownVel.x * predictTime;
                    const predictedY = this.knownPos.y + this.knownVel.y * predictTime;

                    const baseAngle = Math.atan2(predictedY - this.y, predictedX - this.x);
                    const idOffset = (this.id % 2 === 0 ? 1.2 : -1.2);
                    const randomOffset = (Math.random() - 0.5) * 0.8;
                    const offsetAngle = baseAngle + idOffset + randomOffset;
                    const distance = 140 + this.id * 10;

                    moveTargetX = predictedX + Math.cos(offsetAngle) * distance;
                    moveTargetY = predictedY + Math.sin(offsetAngle) * distance;

                    const shouldShoot = this.shootCooldown <= 0 && canSee;
                    if (shouldShoot) {
                        const travelTime = Math.hypot(player.x - this.x, player.y - this.y) / BULLET_SPEED;
                        const aimX = realPlayerPos.x + realPlayerVel.x * travelTime;
                        const aimY = realPlayerPos.y + realPlayerVel.y * travelTime;
                        const angle = Math.atan2(aimY - this.y, aimX - this.x);
                        bullets.push({
                            x: this.x, y: this.y,
                            vx: Math.cos(angle) * BULLET_SPEED,
                            vy: Math.sin(angle) * BULLET_SPEED,
                            dmg: 20,
                            owner: 'enemy'
                        });
                        playShot(false);
                        this.shootCooldown = ENEMY_FIRE_COOLDOWN + Math.random() * 0.5;
                    }
                }
                break;
        }

        let adjusted = this.avoidDangerZones(moveTargetX, moveTargetY, now);
        adjusted = this.adjustForClearZones(adjusted.x, adjusted.y, now);
        moveTargetX = adjusted.x;
        moveTargetY = adjusted.y;

        this.navigateTo(moveTargetX, moveTargetY, dt);
        this.shootCooldown -= dt;

        this.avoidWalls();
        this.avoidOthers(dt);
    }

    moveTo(tx, ty, dt) {
        const angle = Math.atan2(ty - this.y, tx - this.x);
        const dist = Math.hypot(tx - this.x, ty - this.y);
        if (dist < 1) return;
        const step = Math.min(dist, this.speed * dt);
        const nx = this.x + Math.cos(angle) * step;
        const ny = this.y + Math.sin(angle) * step;

        let newX = this.x, newY = this.y;
        if (!checkWallCollision(this, nx, this.y)) newX = nx;
        if (!checkWallCollision(this, newX, ny)) newY = ny;
        if (checkWallCollision(this, newX, newY)) {
            newX = this.x; newY = this.y;
            if (!checkWallCollision(this, nx, this.y)) newX = nx;
            if (!checkWallCollision(this, newX, ny)) newY = ny;
            if (checkWallCollision(this, newX, newY)) {
                newX = this.x;
                newY = this.y;
            }
        }
        this.x = newX;
        this.y = newY;
    }

    avoidWalls() {
        const wallInfo = getWallDistance(this);
        const minDist = this.r + WALL_CUSHION;
        if (wallInfo.dist < minDist && wallInfo.dist > 0.001) {
            const angle = Math.atan2(this.y - wallInfo.closestPt.y, this.x - wallInfo.closestPt.x);
            const pushDist = minDist - wallInfo.dist;
            const pushX = this.x + Math.cos(angle) * pushDist;
            const pushY = this.y + Math.sin(angle) * pushDist;
            if (!checkWallCollision(this, pushX, pushY)) {
                this.x = pushX;
                this.y = pushY;
            }
        }
    }

    avoidOthers(dt) {
        enemies.forEach(other => {
            if (other === this) return;
            const d = Math.hypot(this.x - other.x, this.y - other.y);
            if (d < 30) {
                const angle = Math.atan2(this.y - other.y, this.x - other.x);
                const pushX = this.x + Math.cos(angle) * 2;
                const pushY = this.y + Math.sin(angle) * 2;
                if (!checkWallCollision(this, pushX, this.y)) this.x = pushX;
                if (!checkWallCollision(this, this.x, pushY)) this.y = pushY;
            }
        });
    }

    navigateTo(tx, ty, dt) {
        const goalChanged = !this.lastPathGoal ||
            Math.hypot(tx - this.lastPathGoal.x, ty - this.lastPathGoal.y) > 40;

        this.pathRecalcTimer -= dt;

        if (goalChanged || this.pathRecalcTimer <= 0) {
            this.path          = findPath(this.x, this.y, tx, ty, currentMapIdx) || [];
            this.pathTargetIdx = 0;
            this.lastPathGoal  = { x: tx, y: ty };
            this.pathRecalcTimer = (this.state === 'engage') ? 0.4 : 0.8;
        }

        // Advance past waypoints already reached
        while (this.pathTargetIdx < this.path.length &&
               Math.hypot(this.x - this.path[this.pathTargetIdx].x,
                          this.y - this.path[this.pathTargetIdx].y) < 20) {
            this.pathTargetIdx++;
        }

        if (this.pathTargetIdx < this.path.length) {
            this.moveTo(this.path[this.pathTargetIdx].x, this.path[this.pathTargetIdx].y, dt);
        } else {
            this.moveTo(tx, ty, dt);
        }
    }
}

function spawnSquad() {
    const spawns = MAPS[currentMapIdx].enemySpawns;
    enemies = spawns.map((sp, i) => new Stalker(sp.x, sp.y, i));
}

// ----- Touch controls -----
function setupStick(contId, stickId, callback) {
    const cont = document.getElementById(contId);
    const stick = document.getElementById(stickId);
    let activeId = null;

    const handleStart = (e) => {
        e.preventDefault();
        if (activeId === null && e.changedTouches.length > 0) {
            const touch = e.changedTouches[0];
            activeId = touch.identifier;
            updateStick(touch);
        }
    };
    const handleMove = (e) => {
        e.preventDefault();
        if (activeId !== null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === activeId) {
                    updateStick(touch);
                    break;
                }
            }
        }
    };
    const handleEnd = (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            if (touch.identifier === activeId) {
                activeId = null;
                stick.style.transform = 'translate(0,0)';
                callback(0, 0);
                break;
            }
        }
    };
    const updateStick = (touch) => {
        const rect = cont.getBoundingClientRect();
        const dx = touch.clientX - rect.left - rect.width/2;
        const dy = touch.clientY - rect.top - rect.height/2;
        const dist = Math.min(rect.width/2, Math.hypot(dx, dy));
        const angle = Math.atan2(dy, dx);
        const sx = Math.cos(angle) * dist;
        const sy = Math.sin(angle) * dist;
        stick.style.transform = `translate(${sx}px, ${sy}px)`;

        let nx = sx / (rect.width/2);
        let ny = sy / (rect.height/2);
        if (Math.abs(nx) < DEAD_ZONE) nx = 0;
        if (Math.abs(ny) < DEAD_ZONE) ny = 0;
        callback(nx, ny);
    };
    cont.addEventListener('touchstart', handleStart, {passive: false});
    cont.addEventListener('touchmove', handleMove, {passive: false});
    cont.addEventListener('touchend', handleEnd);
    cont.addEventListener('touchcancel', handleEnd);
}
setupStick('moveStickCont', 'moveStick', (x, y) => { moveInput = {x, y}; });
setupStick('fireStickCont', 'fireStick', (x, y) => { fireInput = {x, y}; });

document.getElementById('resetBtn').addEventListener('click', () => {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    initGame();
    gameActive = true;
    lastTimestamp = performance.now();
    animFrameId = requestAnimationFrame(loop);
});

});
document.getElementById('menuClose').addEventListener('click', () => {
    menuOverlay.classList.remove('open');
});

});

document.querySelectorAll('.mapBtn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mapBtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const val = btn.dataset.map;
        if (val === 'random') {
            mapMode = 'random';
        } else {
            mapMode = 'fixed';
            currentMapIdx = parseInt(val);
        }
        menuOverlay.classList.remove('open');
        if (animFrameId) cancelAnimationFrame(animFrameId);
        initGame();
        gameActive = true;
        lastTimestamp = performance.now();
        animFrameId = requestAnimationFrame(loop);
    });
});

// ----- Main loop -----
let lastTimestamp = performance.now();

function loop(timestamp) {
    const dt = Math.min(0.05, (timestamp - lastTimestamp) / 1000);
    lastTimestamp = timestamp;
    const now = performance.now();

    // Always run cleanup
    deathAlerts = deathAlerts.filter(a => now - a.time < 10000);
    commsMessages = commsMessages.filter(m => now - m.time < 4000);

    // Only run game logic while alive and enemies remain
    if (player.hp > 0 && enemies.length > 0) {
        // Player movement
        const moveX = moveInput.x * PLAYER_SPEED * dt;
        const moveY = moveInput.y * PLAYER_SPEED * dt;
        let newX = player.x + moveX;
        let newY = player.y + moveY;
        if (checkWallCollision(player, newX, player.y)) newX = player.x;
        if (checkWallCollision(player, newX, newY)) newY = player.y;
        if (checkWallCollision(player, newX, newY)) {
            newX = player.x;
            newY = player.y;
        }
        player.prevX = player.x;
        player.prevY = player.y;
        player.x = newX;
        player.y = newY;
        player.vx = (player.x - player.prevX) / dt;
        player.vy = (player.y - player.prevY) / dt;

        // Player shooting
        playerShootTimer -= dt;
        const firePower = Math.hypot(fireInput.x, fireInput.y);
        if (firePower > 0.6 && playerShootTimer <= 0) {
            const angle = Math.atan2(fireInput.y, fireInput.x);
            bullets.push({
                x: player.x, y: player.y,
                vx: Math.cos(angle) * PLAYER_BULLET_SPEED,
                vy: Math.sin(angle) * PLAYER_BULLET_SPEED,
                dmg: 15,
                owner: 'player'
            });
            playShot(true);
            playerShootTimer = PLAYER_FIRE_RATE;
        }

        // Update enemies
        enemies.forEach(e => e.update(dt, now));

        // Update bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            let removed = false;
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) removed = true;
            for (let w of walls) {
                if (b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) {
                    removed = true;
                    break;
                }
            }
            if (!removed) {
                if (b.owner === 'enemy' && Math.hypot(b.x - player.x, b.y - player.y) < player.r) {
                    player.hp -= b.dmg;
                    removed = true;
                } else if (b.owner === 'player') {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (Math.hypot(b.x - e.x, b.y - e.y) < e.r) {
                            e.hp -= b.dmg;
                            removed = true;
                            if (e.hp <= 0) {
                                deathAlerts.push({
                                    time: now,
                                    deadPos: {x: e.x, y: e.y},
                                    playerPos: {x: player.x, y: player.y},
                                    playerVx: player.vx,
                                    playerVy: player.vy,
                                    id: deathAlertIdCounter++
                                });
                                enemies.splice(j, 1);
                            }
                            break;
                        }
                    }
                }
            }
            if (removed) bullets.splice(i, 1);
        }
    }

    // ----- Rendering -----
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#110000";
    for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
    for (let i = 0; i < canvas.height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
    ctx.fillStyle = "#330000";
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    for (let alert of deathAlerts) {
        const age = (now - alert.time) / 1000;
        if (age < 8) {
            const alpha = Math.max(0, 1 - age / 8) * 0.4;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = "#ffff00";
            ctx.lineWidth = 1;
            const dx = alert.deadPos.x, dy = alert.deadPos.y;
            ctx.beginPath();
            ctx.moveTo(dx - 8, dy - 8); ctx.lineTo(dx + 8, dy + 8);
            ctx.moveTo(dx + 8, dy - 8); ctx.lineTo(dx - 8, dy + 8);
            ctx.stroke();
            ctx.restore();
        }
    }

    // Draw player (sprite or fallback)
    if (playerSprite.complete && !playerSprite.loadFailed) {
        ctx.drawImage(playerSprite, player.x - player.r, player.y - player.r, player.r * 2, player.r * 2);
    } else {
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fill();
    }

    enemies.forEach(e => {
        // Draw enemy sprite or fallback circle
        if (enemySprite.complete && !enemySprite.loadFailed) {
            ctx.drawImage(enemySprite, e.x - e.r, e.y - e.r, e.r * 2, e.r * 2);
        } else {
            ctx.fillStyle = "#ff0000";
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
            ctx.fill();
        }

        // HP bar (always drawn)
        ctx.fillStyle = "#200";
        ctx.fillRect(e.x - 12, e.y - 18, 24, 4);
        ctx.fillStyle = "#f00";
        ctx.fillRect(e.x - 12, e.y - 18, (e.hp / 100) * 24, 4);

        if (e.deathAlertTimer > 0) {
            const alpha = Math.min(1, e.deathAlertTimer);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = "#ffff00";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r + 8, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = "#ffff00";
            ctx.font = "bold 10px Courier New";
            ctx.fillText("⚠ ALLY DOWN", e.x - 35, e.y - 22);
            ctx.restore();
        }

        if (e.broadcastTimer > 0) {
            const alpha = Math.min(1, e.broadcastTimer);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = "#00ffff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r + 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = "#00ffff";
            ctx.font = "10px Courier New";
            ctx.fillText("📡 CALL OUT", e.x - 30, e.y - 20);
            ctx.restore();
        }
    });

    bullets.forEach(b => {
        ctx.fillStyle = b.owner === 'player' ? "#fff" : "#f00";
        ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
    });

    document.getElementById('hp-val').innerText = Math.max(0, Math.ceil(player.hp));
    document.getElementById('player-hp').style.width = Math.max(0, player.hp) + "%";
    if (!enemies.length) {
        document.getElementById('intel-text').innerText = 'CLEAR';
    } else if (enemies.some(e => e.hasSight)) {
        document.getElementById('intel-text').innerText = 'CONTACT';
    } else if (enemies.some(e => e.confidence > 0.3)) {
        document.getElementById('intel-text').innerText = 'TRACKING';
    } else {
        document.getElementById('intel-text').innerText = 'SCANNING';
    }

    // ----- Screen damage overlay (aligned to 20-HP increments) -----
    const hp = player.hp;
    if (hp <= 80) {
        const stage = hp <= 40 ? 2 : hp <= 60 ? 1 : 0;
        const stageAlpha = stage === 0 ? Math.max(0.3, (80 - hp) / 20) : 1.0;

        // Cracks
        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${0.18 + stage * 0.12})`;
        ctx.lineWidth = 1;
        for (let s = 0; s <= stage; s++) {
            const sa = s < stage ? 1 : stageAlpha;
            ctx.globalAlpha = sa;
            for (const ray of crackSets[s]) {
                ctx.beginPath();
                for (let i = 0; i < ray.length; i++) {
                    const seg = ray[i];
                    if (i === 0) ctx.moveTo(seg.x1, seg.y1);
                    ctx.lineTo(seg.x2, seg.y2);
                }
                ctx.stroke();
            }
        }
        ctx.restore();

        // Blood vignette
        const vigStr = Math.max(0.2, Math.min(1, (80 - hp) / 80));
        const vRad = ctx.createRadialGradient(
            canvas.width/2, canvas.height/2, canvas.height * 0.2,
            canvas.width/2, canvas.height/2, canvas.height * 0.75
        );
        vRad.addColorStop(0, 'rgba(120,0,0,0)');
        vRad.addColorStop(1, `rgba(160,0,0,${vigStr * 0.72})`);
        ctx.save();
        ctx.globalAlpha = 1;
        ctx.fillStyle = vRad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();

        // Blood drips
        if (Math.random() < Math.max(0.03, (80 - hp) / 80 * 0.15)) {
            bloodDrips.push({
                x: Math.random() * canvas.width,
                y: 0,
                vy: 40 + Math.random() * 80,
                w: 2 + Math.random() * 3,
                len: 18 + Math.random() * 40,
                alpha: 0.5 + Math.random() * 0.4
            });
        }
        bloodDrips = bloodDrips.filter(d => d.y < canvas.height + 60);
        bloodDrips.forEach(d => {
            d.y += d.vy * dt;
            ctx.save();
            ctx.globalAlpha = d.alpha;
            ctx.fillStyle = '#8b0000';
            ctx.beginPath();
            ctx.roundRect(d.x - d.w/2, d.y, d.w, d.len, d.w/2);
            ctx.fill();
            ctx.restore();
        });
    }

    // ----- Death screen (animated) -----
    if (player.hp <= 0) {
        deathProgress = Math.min(1, deathProgress + dt * 1.1);

        // Shatter
        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${deathProgress * 0.55})`;
        ctx.lineWidth = 1.5;
        for (const set of crackSets) {
            for (const ray of set) {
                ctx.beginPath();
                for (let i = 0; i < ray.length; i++) {
                    const seg = ray[i];
                    if (i === 0) ctx.moveTo(seg.x1, seg.y1);
                    ctx.lineTo(seg.x2, seg.y2);
                }
                ctx.stroke();
            }
        }
        ctx.restore();

        // Blood wash
        ctx.save();
        const washY = canvas.height * deathProgress;
        ctx.globalAlpha = Math.min(1, deathProgress * 1.4);
        ctx.fillStyle = '#6b0000';
        ctx.fillRect(0, 0, canvas.width, washY);
        ctx.fillStyle = '#8b0000';
        for (let xi = 0; xi < canvas.width; xi += 18) {
            const dripLen = 8 + Math.sin(xi * 0.3) * 12 + Math.cos(xi * 0.7) * 8;
            ctx.fillRect(xi, washY - 2, 10, Math.max(0, dripLen));
        }
        ctx.restore();

        // KIA text
        if (deathProgress > 0.6) {
            ctx.save();
            ctx.globalAlpha = (deathProgress - 0.6) / 0.4;
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 52px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('K.I.A.', canvas.width/2, canvas.height/2);
            ctx.font = '16px Courier New';
            ctx.fillText('PRESS RESET', canvas.width/2, canvas.height/2 + 36);
            ctx.textAlign = 'left';
            ctx.restore();
        }

        // Keep animating until complete, then stop
        if (deathProgress < 1) {
            animFrameId = requestAnimationFrame(loop);
        }
        return;
    }

    // ----- Win screen -----
    if (enemies.length === 0) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 32px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('THREAT ELIMINATED', canvas.width/2, canvas.height/2);
        ctx.textAlign = 'left';
        ctx.restore();
        return;
    }

    animFrameId = requestAnimationFrame(loop);
}

initPathfinding();
initGame();
animFrameId = requestAnimationFrame(loop);
</script>
</body>
</html>
