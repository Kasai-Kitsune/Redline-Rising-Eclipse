<script>
  // BOOT SEQUENCE
  const boot = document.getElementById('boot');
  const bootText = document.getElementById('bootText');
  const main = document.querySelector('.main');
  const text = '>> LOADING ECLIPSE PROTOCOL...';
  let i = 0;
  
  function typeWriter() {
    if (i < text.length) {
      bootText.textContent += text.charAt(i);
      i++;
      setTimeout(typeWriter, 42 + Math.random() * 30);
    } else {
      setTimeout(() => {
        boot.style.opacity = '0';
        main.style.opacity = '1';
        setTimeout(() => { boot.style.display = 'none'; }, 900);
      }, 650);
    }
  }
  
  window.addEventListener('load', () => {
    setTimeout(typeWriter, 400);
  });

  // PARTICLES - RED DUST
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let width, height;
  
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      r: Math.random() * 1.8 + 0.3,
      s: Math.random() * 0.4 + 0.1,
      o: Math.random() * 0.5 + 0.2,
      d: Math.random() * 0.02 - 0.01
    });
  }
  
  function animate() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(p => {
      p.y -= p.s;
      p.x += Math.sin(Date.now() * 0.001 + p.y * 0.01) * p.d;
      if (p.y < -10) { p.y = height + 10; p.x = Math.random() * width; }
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, ${20 + Math.random()*30}, ${20}, ${p.o})`;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 8;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
